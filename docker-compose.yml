version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: roomfinder_postgres
    environment:
      POSTGRES_DB: roomfinder
      POSTGRES_USER: roomfinder
      POSTGRES_PASSWORD: roomfinder_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U roomfinder']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roomfinder_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: roomfinder_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@roomfinder.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
